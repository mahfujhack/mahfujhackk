<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahfuj Hack Seller</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #0b0f1a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }
        #add-money-modal, #confirm-dialog, #profile-modal { position: fixed; inset: 0; background: rgba(3, 4, 7, 0.95); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .input-box { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; padding: 14px 20px; width: 100%; outline: none; color: white; }
        .support-btn { position: fixed; bottom: 20px; right: 20px; z-index: 500; transition: 0.3s; }
        #notice-bar { background: linear-gradient(90deg, #1e40af, #3b82f6); border-radius: 15px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 15px; object-fit: cover; border: 2px solid #3b82f6; }
        
        /* Slider Styles */
        #slider-container { width: 100%; border-radius: 25px; margin-bottom: 20px; overflow: hidden; position: relative; background: rgba(255,255,255,0.02); height: 160px; }
        #slider-wrapper { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none; height: 100%; }
        #slider-wrapper::-webkit-scrollbar { display: none; }
        .slide { flex: 0 0 100%; width: 100%; height: 100%; scroll-snap-align: start; cursor: pointer; }
        .slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 25px; }
        .slider-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; pointer-events: none; }
        .dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: all 0.3s ease; }
        .dot.active { background: white; width: 16px; border-radius: 10px; }
        
        .key-box { background: rgba(16, 185, 129, 0.1); border: 1px dashed #10b981; color: #10b981; padding: 10px; border-radius: 12px; font-family: monospace; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <a id="support-link" href="#" target="_blank" class="support-btn bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl border border-white/20">
        <i class="fas fa-headset text-xl"></i>
    </a>

    <div id="auth-ui" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-[40px] text-center">
            <h2 class="text-2xl font-black mb-6 tracking-tighter">Mahfuj <span class="text-blue-500">Hack</span></h2>
            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="ইমেইল" class="input-box">
                <input type="password" id="pass" placeholder="পাসওয়ার্ড" class="input-box">
                <button onclick="login()" class="w-full blue-gradient py-4 rounded-2xl font-bold">লগইন</button>
                <button onclick="toggleAuth(false)" class="text-xs text-zinc-400">নতুন অ্যাকাউন্ট তৈরি করুন</button>
            </div>
            <div id="register-form" class="hidden space-y-4">
                <input type="text" id="reg-name" placeholder="আপনার নাম" class="input-box">
                <input type="email" id="reg-email" placeholder="ইমেইল" class="input-box">
                <input type="number" id="reg-phone" placeholder="মোবাইল নম্বর" class="input-box">
                <input type="password" id="reg-pass" placeholder="পাসওয়ার্ড" class="input-box">
                <button onclick="register()" class="w-full bg-green-600 py-4 rounded-2xl font-bold">রেজিস্ট্রেশন</button>
                <button onclick="toggleAuth(true)" class="text-xs text-zinc-400">লগইন করুন</button>
            </div>
        </div>
    </div>

    <div id="dashboard-ui" class="hidden min-h-screen p-4 max-w-4xl mx-auto">
        <div id="notice-container" class="mb-6">
            <div id="notice-bar" class="p-3 flex items-center gap-3 border border-white/10 overflow-hidden">
                <div class="bg-white/20 w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"><i class="fas fa-bullhorn text-xs"></i></div>
                <marquee id="admin-notice" class="text-xs font-bold text-white">স্বাগতম মাহফুজ হ্যাক সেলার-এ...</marquee>
            </div>
        </div>

        <div id="slider-container" class="hidden">
            <div id="slider-wrapper"></div>
            <div id="slider-dots" class="slider-dots"></div>
        </div>

        <header class="flex justify-between items-center py-6">
            <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile()">
                <img id="display-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="user-avatar">
                <div>
                    <h1 id="display-name" class="text-sm font-black italic">User</h1>
                    <p id="display-email" class="text-[10px] text-zinc-400 italic">loading...</p>
                    <p id="display-phone" class="text-[9px] text-blue-400 font-bold">01xxxxxxxxx</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openAddMoney()" class="bg-pink-600/20 text-pink-500 border border-pink-500/30 px-3 py-2 rounded-xl text-[9px] font-bold uppercase">Add Money</button>
                <div class="bg-blue-600/10 text-blue-400 px-4 py-2 rounded-xl font-bold text-sm">৳ <span id="user-balance">0</span></div>
                <button onclick="auth.signOut()" class="text-red-500 bg-red-500/10 p-2 rounded-xl"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div id="store-content" class="mt-4"></div>

        <div class="my-10">
            <h2 class="text-sm font-bold text-blue-500 mb-6 uppercase tracking-widest italic">Order History</h2>
            <div id="order-history" class="grid gap-4"></div>
        </div>
    </div>

    <div id="profile-modal">
        <div class="glass w-full max-w-[380px] p-8 rounded-[35px] relative">
            <button onclick="closeProfile()" class="absolute top-6 right-6 text-zinc-500"><i class="fas fa-times"></i></button>
            <div class="text-center mb-6">
                <img id="edit-img-preview" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-20 h-20 rounded-3xl mx-auto mb-4 border-2 border-blue-500 object-cover">
                <h2 class="text-xl font-black">Profile Setting</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="edit-name" class="input-box" placeholder="নাম">
                <input type="number" id="edit-phone" class="input-box" placeholder="নম্বর">
                <input type="text" id="edit-img-url" class="input-box" placeholder="ছবির লিংক">
                <input type="password" id="edit-password" class="input-box" placeholder="পাসওয়ার্ড">
                <button onclick="saveProfile()" class="w-full blue-gradient py-4 rounded-2xl font-bold">Update</button>
            </div>
        </div>
    </div>

    <div id="add-money-modal">
        <div class="glass w-full max-w-[380px] p-8 rounded-[35px] relative">
            <button onclick="closeAddMoney()" class="absolute top-6 right-6 text-zinc-500"><i class="fas fa-times"></i></button>
            <h2 class="text-xl font-black text-center mb-6">Deposit Money</h2>
            <div class="bg-pink-600/10 p-5 rounded-[25px] mb-6 text-center">
                <p class="text-[11px] text-pink-400 mb-2">bkash (Send Money): <span class="font-black text-white">01972682887</span></p>
                <button onclick="copyNumberText('01972682887')" class="bg-pink-600 text-white px-6 py-2 rounded-xl text-xs">Copy Number</button>
            </div>
            <form id="paymentForm" class="space-y-4">
                <label class="text-[10px] text-zinc-500 px-2">ইউজার জিমেইল:</label>
                <input type="email" id="uEmail" class="input-box opacity-50" readonly>
                
                <input type="number" id="uAmt" class="input-box" placeholder="টাকার পরিমাণ" required>
                <input type="text" id="uTrx" class="input-box" placeholder="Transaction ID" required>
                <button type="submit" class="w-full bg-pink-600 py-4 rounded-2xl font-bold">Submit Request</button>
            </form>
        </div>
    </div>

    <div id="confirm-dialog">
        <div class="glass w-full max-w-[320px] p-8 rounded-[35px] text-center">
            <h3 class="text-lg font-bold mb-2">অর্ডার নিশ্চিত?</h3>
            <div class="flex gap-3 mt-6">
                <button onclick="processOrder()" class="flex-1 blue-gradient py-3 rounded-2xl font-bold">Buy</button>
                <button onclick="closeConfirm()" class="flex-1 bg-white/5 py-3 rounded-2xl font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // --- Updated Firebase Config from google-services.json ---
        const firebaseConfig = { 
            apiKey: "AIzaSyDs3yrS8atClFj07l7szUWihmmMnq8cpiA", 
            authDomain: "mahfujhackseller.firebaseapp.com", 
            databaseURL: "https://mahfujhackseller-default-rtdb.firebaseio.com", 
            projectId: "mahfujhackseller", 
            storageBucket: "mahfujhackseller.firebasestorage.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        // --- Notifications ---
        const TG_TOKEN = "8704920677:AAGyq2OUzzKSAEkPFxcymGQqY8qRz0bRx5Y";
        const TG_CHAT_ID = "7809984933";
        function sendTelegram(msg) {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
        }
        function toast(m, type = "success") { 
            Toastify({ text: m, duration: 3000, gravity: "top", position: "center", style: { background: type === "success" ? "#10b981" : "#ef4444", borderRadius: "15px" } }).showToast(); 
        }

        // --- Auth Module ---
        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
        }
        function login() { 
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => toast("লগইন ব্যর্থ!", "error")); 
        }
        function register() {
            const n = document.getElementById('reg-name').value, e = document.getElementById('reg-email').value, ph = document.getElementById('reg-phone').value, p = document.getElementById('reg-pass').value;
            if(!n || !e || !ph || !p) return toast("সব ঘর পূরণ করুন", "error");
            auth.createUserWithEmailAndPassword(e, p).then(c => {
                db.ref('users/' + c.user.uid).set({ name: n, email: e, phone: ph, balance: 0, profileImg: '', password: p });
                toast("সফল!");
            }).catch(err => toast(err.message, "error"));
        }

        // --- App Observer ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('dashboard-ui').classList.remove('hidden');
                db.ref('users/' + user.uid).on('value', s => {
                    const ud = s.val() || {};
                    document.getElementById('display-name').innerText = ud.name || 'User';
                    document.getElementById('display-email').innerText = ud.email || user.email;
                    document.getElementById('display-phone').innerText = ud.phone || '01xxxxxxxxx';
                    document.getElementById('user-balance').innerText = ud.balance || 0;
                    if(ud.profileImg) {
                        document.getElementById('display-img').src = ud.profileImg;
                        document.getElementById('edit-img-preview').src = ud.profileImg;
                    }
                });
                loadSettings(); loadSlider(); loadStore(); loadOrders(user.uid);
            } else {
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('dashboard-ui').classList.add('hidden');
            }
        });

        // --- Profile ---
        function openProfile() { 
            document.getElementById('profile-modal').style.display = 'flex'; 
            db.ref('users/' + auth.currentUser.uid).once('value', s => {
                const ud = s.val();
                document.getElementById('edit-name').value = ud.name || '';
                document.getElementById('edit-phone').value = ud.phone || '';
                document.getElementById('edit-img-url').value = ud.profileImg || '';
                document.getElementById('edit-password').value = ud.password || '';
            });
        }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
        function saveProfile() {
            const n = document.getElementById('edit-name').value, ph = document.getElementById('edit-phone').value, im = document.getElementById('edit-img-url').value, ps = document.getElementById('edit-password').value;
            db.ref('users/' + auth.currentUser.uid).update({ name: n, phone: ph, profileImg: im, password: ps }).then(() => { toast("আপডেট হয়েছে!"); closeProfile(); });
        }

        // --- Add Money ---
        function openAddMoney() { 
            document.getElementById('add-money-modal').style.display = 'flex'; 
            document.getElementById('uEmail').value = auth.currentUser.email;
        }
        function closeAddMoney() { document.getElementById('add-money-modal').style.display = 'none'; }
        
        document.getElementById('paymentForm').onsubmit = (e) => {
            e.preventDefault();
            const amt = document.getElementById('uAmt').value;
            const trx = document.getElementById('uTrx').value;
            const email = document.getElementById('uEmail').value;

            db.ref('deposit_requests').push({ 
                uid: auth.currentUser.uid, 
                email: email, 
                amount: amt, 
                info: trx, 
                status: 'Pending',
                time: Date.now()
            }).then(() => {
                sendTelegram(`💰 <b>Deposit Request!</b>\nEmail: ${email}\nAmount: ${amt} BDT\nTrxID: ${trx}`);
                toast("অনুরোধ পাঠানো হয়েছে!"); 
                closeAddMoney();
                e.target.reset();
            });
        };

        // --- Store Module ---
        function loadStore() {
            db.ref('categories').on('value', s => {
                let html = ''; const cats = s.val();
                for(let id in cats) {
                    html += `<div class="mb-8"><h2 class="text-blue-500 font-bold text-[10px] mb-4 uppercase italic tracking-widest">${cats[id].name}</h2><div id="p-${id}" class="grid grid-cols-2 gap-4"></div></div>`;
                    db.ref('products').orderByChild('category').equalTo(id).on('value', ps => {
                        let ph = ''; const prods = ps.val();
                        for(let pid in prods) {
                            ph += `<div class="glass p-3 rounded-[24px] text-center">
                                <img src="${prods[pid].image}" class="w-full aspect-square rounded-[18px] mb-2 object-cover">
                                <h3 class="text-[11px] font-bold truncate">${prods[pid].name}</h3>
                                <p class="text-blue-500 font-bold mb-2">৳ ${prods[pid].price}</p>
                                <button onclick="buyConfirm('${pid}', '${prods[pid].name}', ${prods[pid].price})" class="w-full bg-white/5 py-2 rounded-xl text-[10px] font-bold">BUY NOW</button>
                            </div>`;
                        }
                        const el = document.getElementById('p-'+id); if(el) el.innerHTML = ph;
                    });
                }
                document.getElementById('store-content').innerHTML = html;
            });
        }

        let selProd = null;
        function buyConfirm(pid, name, price) { selProd = { pid, name, price }; document.getElementById('confirm-dialog').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('confirm-dialog').style.display = 'none'; }
        function processOrder() {
            db.ref('users/' + auth.currentUser.uid).once('value', s => {
                const bal = s.val().balance || 0;
                if(bal < selProd.price) { toast("টাকা নেই!", "error"); return closeConfirm(); }
                db.ref('users/' + auth.currentUser.uid).update({ balance: bal - selProd.price });
                db.ref('orders').push({ uid: auth.currentUser.uid, email: auth.currentUser.email, productName: selProd.name, price: selProd.price, status: 'Pending', time: Date.now() });
                sendTelegram(`🛍️ <b>New Order!</b>\nEmail: ${auth.currentUser.email}\nItem: ${selProd.name}`);
                toast("অর্ডার সফল!"); closeConfirm();
            });
        }

        // --- Slider & Settings ---
        function loadSettings() {
            db.ref('settings/notice').on('value', s => { document.getElementById('admin-notice').innerText = s.val() || "স্বাগতম!"; });
            db.ref('settings/support').on('value', s => { document.getElementById('support-link').href = s.val() || "#"; });
        }
        function loadSlider() {
            db.ref('settings/slider').on('value', s => {
                const data = s.val(); if(!data) return;
                let h = '', d = ''; const keys = Object.keys(data);
                keys.forEach((k, i) => {
                    const l = data[k].link ? `onclick="window.open('${data[k].link}', '_blank')"` : "";
                    h += `<div class="slide" ${l}><img src="${data[k].img}"></div>`;
                    d += `<div class="dot ${i===0?'active':''}"></div>`;
                });
                document.getElementById('slider-wrapper').innerHTML = h;
                document.getElementById('slider-dots').innerHTML = d;
                document.getElementById('slider-container').classList.remove('hidden');
            });
        }

        // --- Order History ---
        function loadOrders(uid) {
            db.ref('orders').orderByChild('uid').equalTo(uid).on('value', s => {
                let h = ''; const data = s.val();
                const list = []; for(let id in data) list.push(data[id]);
                list.reverse().forEach(o => {
                    let keyBox = (o.status==='Success' && o.deliveredKey) ? `<div class="key-box"><span>Key: ${o.deliveredKey}</span><i class="fas fa-copy cursor-pointer" onclick="copyNumberText('${o.deliveredKey}')"></i></div>` : '';
                    h += `<div class="glass p-4 rounded-[20px] mb-2">
                        <div class="flex justify-between items-center">
                            <div><p class="text-xs font-bold">${o.productName}</p><p class="text-[9px] text-zinc-500">${new Date(o.time).toLocaleString()}</p></div>
                            <span class="text-[10px] px-3 py-1 rounded-full ${o.status==='Success'?'bg-green-500/10 text-green-500':'bg-orange-500/10 text-orange-400'}">${o.status}</span>
                        </div>
                        ${keyBox}
                    </div>`;
                });
                document.getElementById('order-history').innerHTML = h || "<p class='text-center text-xs opacity-20'>No Orders</p>";
            });
        }

        function copyNumberText(v) { 
            const t = document.createElement("textarea"); t.value = v; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); toast("কপি হয়েছে!"); 
        }
    </script>
</body>
</html>
